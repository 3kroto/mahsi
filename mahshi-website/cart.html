<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سلة الطلبات</title>
</head>

<body>

<h1>🛒 طلباتك</h1>

<ul id="cart"></ul>

<h3 id="total"></h3>

<button onclick="checkout()">تأكيد الطلب</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let list = document.getElementById("cart");
let total = 0;

cart.forEach(item => {
  let li = document.createElement("li");
  li.textContent = item.name + " - " + item.price + " جنيه";
  list.appendChild(li);
  total += item.price;
});

document.getElementById("total").textContent = "الإجمالي: " + total + " جنيه";

function checkout() {
  localStorage.setItem("orders", JSON.stringify(cart));
  localStorage.removeItem("cart");
  alert("تم إرسال الطلب 🎉");
}
</script>

</body>
</html>
